name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          pip install flake8 pytest

      # 4️⃣ Linting (code quality)
      - name: Run linting
        run: |
          flake8 .

      # 5️⃣ Run tests (unit testing)
      - name: Run tests
        run: |
          pytest -v

      # 6️⃣ Run application (health check)
      - name: Run application
        run: |
          python3 network_checker.py google.com