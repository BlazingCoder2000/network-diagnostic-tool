name: CI Pipeline (Failure Test)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install flake8 pytest

      - name: Run linting
        run: |
          flake8 .

      - name: Run tests
        run: |
          pytest -v

      # 🔥 INTENTIONAL FAILURE STEP
      - name: Run application (FAIL CASE)
        run: |
          python3 network_checker.py invaliddomain12345.com