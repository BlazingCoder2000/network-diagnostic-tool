name: CI Pipeline (Docker)

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build -t network-checker .

      - name: Run tests inside container
        run: |
          docker run network-checker